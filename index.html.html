<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestăo de Empenhos</title>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
<style>
body{font-family:'Segoe UI',Tahoma,Verdana,sans-serif;background:#f5f7fa;margin:0;color:#333;}
header{background:linear-gradient(90deg,#1abc9c,#3498db);color:#fff;padding:20px;text-align:center;font-size:26px;font-weight:bold;}
header img{max-height:60px;margin-bottom:10px;border-radius:6px;}
#loginScreen,#app{display:flex;flex-direction:column;gap:15px;max-width:950px;margin:20px auto;padding:20px;background:#fff;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1);}
.field-group{display:flex;flex-wrap:wrap;gap:15px;margin-bottom:15px;}
.field-group>div{flex:1;min-width:180px;}
input,textarea,select,button{padding:8px;border-radius:6px;border:1px solid #ccc;font-size:14px;}
button{cursor:pointer;border:none;color:#fff;background:#3498db;transition:0.3s;}
button:hover{background:#2980b9;}
.card{border-radius:10px;padding:12px;margin:8px 0;box-shadow:0 2px 8px rgba(0,0,0,0.12);background:#fff;transition:0.3s;}
.card.alerta-vencimento{border-left:4px solid #e74c3c;}
.card-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:bold;}
.card-body{display:none;padding-top:10px;}
.status-bar{height:8px;width:100%;border-radius:4px;margin-top:6px;}
.status-bar.pendente{background:#f1c40f;}
.status-bar.programado{background:#e67e22;}
.status-bar.liberado{background:#2ecc71;}
#calendar{max-width:950px;margin:20px auto;}
label{font-weight:bold;font-size:13px;}
.indicadores-container{margin-bottom:20px;}
.indicador{margin-bottom:8px;font-size:14px;}
.indicador-bar{height:12px;border-radius:6px;background:#3498db;display:inline-block;}
</style>
</head>
<body>

<header>
  <img src="https://images.unsplash.com/photo-1602524206012-86e5df81a35c?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1200" alt="Banner">
  Gestăo de Empenhos
</header>

<div id="loginScreen">
  <button id="loginBtn">Login com Google</button>
</div>

<div id="app">
  <button id="logoutBtn">Logout</button>

  <div class="indicadores-container" id="indicadores"></div>

  <div class="field-group">
    <div><label for="searchEmpenho">Pesquisar por Número do Empenho</label><input type="text" id="searchEmpenho" placeholder="Digite o número do empenho"></div>
  </div>
  <div class="field-group">
    <div><label for="itemChegou">Item Chegou em Estoque</label><input type="text" id="itemChegou" placeholder="Digite o produto recebido"><button id="verPendentes">Ver Pendentes</button></div>
  </div>

  <div class="field-group">
    <div><label for="cliente">Cliente</label><input id="cliente" placeholder="Nome do cliente"></div>
    <div><label for="produtos">Produtos</label><textarea id="produtos" placeholder="Uma linha por produto"></textarea></div>
    <div><label for="quantidade">Quantidade</label><input type="number" id="quantidade" placeholder="Qtd total"></div>
  </div>

  <div class="field-group">
    <div><label for="tipo">Tipo</label>
      <select id="tipo">
        <option value="pendente">Pendente</option>
        <option value="programado">Programado</option>
        <option value="liberado">Liberado</option>
      </select>
    </div>
    <div><label for="motivo">Motivo</label>
      <select id="motivo">
        <option value="Prorrogacao">Prorrogaçăo</option>
        <option value="Outro">Outro</option>
      </select>
    </div>
    <div><label><input type="checkbox" id="liberacaoParcial"> Liberaçăo Parcial</label></div>
  </div>

  <div class="field-group">
    <div><label for="dataRecebimento">Data de Recebimento</label><input type="date" id="dataRecebimento"></div>
    <div><label for="dataEntrega">Data Limite</label><input type="date" id="dataEntrega"></div>
    <div><label for="dataPrevista">Data Prevista</label><input type="date" id="dataPrevista"></div>
  </div>

  <button onclick="salvarEmpenho()">Salvar</button>
  <button id="exportExcel">Exportar Relatório Excel</button>

  <h2>Pendentes</h2><div id="pendentes"></div>
  <h2>Programados</h2><div id="programados"></div>
  <h2>Liberados</h2><div id="liberados"></div>

  <div id="calendar"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ?? Troque pelo seu Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDYmKSkQ8IMzMbN2xYkhTJHUbC3r20KWpY",
  authDomain: "gestao-empenhos-luiz.firebaseapp.com",
  projectId: "gestao-empenhos-luiz",
  appId: "1:374624984511:web:4590c1d3da85ddfcb0950a"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

document.addEventListener("DOMContentLoaded", () => {
  const loginScreen=document.getElementById("loginScreen");
  const appScreen=document.getElementById("app");
  const loginBtn=document.getElementById("loginBtn");
  const logoutBtn=document.getElementById("logoutBtn");

  const cliente=document.getElementById("cliente");
  const produtos=document.getElementById("produtos");
  const quantidade=document.getElementById("quantidade");
  const tipo=document.getElementById("tipo");
  const motivo=document.getElementById("motivo");
  const liberacaoParcial=document.getElementById("liberacaoParcial");
  const dataRecebimento=document.getElementById("dataRecebimento");
  const dataEntrega=document.getElementById("dataEntrega");
  const dataPrevista=document.getElementById("dataPrevista");

  const pendentes=document.getElementById("pendentes");
  const programados=document.getElementById("programados");
  const liberados=document.getElementById("liberados");

  const searchEmpenho=document.getElementById("searchEmpenho");
  const itemChegou=document.getElementById("itemChegou");
  const verPendentes=document.getElementById("verPendentes");

  const indicadores=document.getElementById("indicadores");
  const exportExcelBtn=document.getElementById("exportExcel");

  loginBtn.addEventListener("click",()=>signInWithPopup(auth,provider));
  logoutBtn.addEventListener("click",()=>signOut(auth));

  onAuthStateChanged(auth,user=>{
    if(user){loginScreen.style.display="none";appScreen.style.display="flex";carregarEmpenhos();}
    else{loginScreen.style.display="flex";appScreen.style.display="none";}
  });

  window.salvarEmpenho=async function(){
    if(!cliente.value||!produtos.value||!quantidade.value)return;
    await addDoc(collection(db,"empenhos"),{
      cliente:cliente.value,
      produtos:produtos.value.split("\n"),
      quantidade:parseInt(quantidade.value),
      tipo:tipo.value,
      motivo:motivo.value,
      liberacaoParcial:liberacaoParcial.checked,
      dataRecebimento:dataRecebimento.value,
      dataEntrega:dataEntrega.value,
      dataPrevista:dataPrevista.value
    });
    cliente.value="";produtos.value="";quantidade.value="";dataRecebimento.value="";dataEntrega.value="";dataPrevista.value="";liberacaoParcial.checked=false;
    carregarEmpenhos();
  };

  async function carregarEmpenhos(){
    pendentes.innerHTML="";programados.innerHTML="";liberados.innerHTML="";
    indicadores.innerHTML="";

    let snapshot=await getDocs(collection(db,"empenhos"));
    let eventos=[];
    let contMotivo={}, contItem={}, contStatus={pendente:0,programado:0,liberado:0};

    snapshot.forEach(docSnap=>{
      let e=docSnap.data(); e.id=docSnap.id;

      contStatus[e.tipo]++; 
      contMotivo[e.motivo]=(contMotivo[e.motivo]||0)+1;
      e.produtos.forEach(p=>{contItem[p]=(contItem[p]||0)+1;});

      if(searchEmpenho.value && !docSnap.id.includes(searchEmpenho.value)) return;
      const itemFiltro=itemChegou.value.toLowerCase();
      if(itemFiltro && !e.produtos.some(p=>p.toLowerCase().includes(itemFiltro))) return;

      let alerta=false;
      if(e.tipo==="pendente" && e.dataEntrega){
        const hoje=new Date(); const limite=new Date(e.dataEntrega);
        const diff=(limite-hoje)/(1000*60*60*24);
        if(diff<=3) alerta=true;
      }

      const card=document.createElement("div");
      card.className="card"+(alerta?" alerta-vencimento":"");
      card.innerHTML=`<div class="card-header">${e.cliente} <span>&#9660;</span></div>
                      <div class="card-body">
                      Produtos: ${e.produtos.join(", ")}<br>
                      Qtd: ${e.quantidade}<br>
                      Motivo: ${e.motivo}<br>
                      Liberaçăo Parcial: ${e.liberacaoParcial?'Sim':'Năo'}<br>
                      Recebimento: ${e.dataRecebimento}<br>
                      Limite: ${e.dataEntrega}<br>
                      Prevista: ${e.dataPrevista}<br>
                      <div class="status-bar ${e.tipo}"></div>
                      Status: <select class="mudarStatus">
                        <option value="pendente" ${e.tipo==='pendente'?'selected':''}>Pendente</option>
                        <option value="programado" ${e.tipo==='programado'?'selected':''}>Programado</option>
                        <option value="liberado" ${e.tipo==='liberado'?'selected':''}>Liberado</option>
                      </select>
                      <button class="excluirBtn" style="margin-top:8px;background:#e74c3c;">Excluir</button>
                      </div>`;

      const header=card.querySelector(".card-header");
      const body=card.querySelector(".card-body");
      header.addEventListener("click",()=>{body.style.display=body.style.display==="none"?"block":"none";});
      card.querySelector(".mudarStatus").addEventListener("change", async (ev)=>{
        await updateDoc(doc(db,"empenhos",e.id),{tipo: ev.target.value});
        carregarEmpenhos();
      });

      card.querySelector(".excluirBtn").addEventListener("click", async ()=>{
        if(confirm(`Deseja realmente excluir o empenho de ${e.cliente}?`)){
          await deleteDoc(doc(db,"empenhos",e.id));
          carregarEmpenhos();
        }
      });

      if(e.tipo==="pendente") pendentes.appendChild(card);
      if(e.tipo==="programado") programados.appendChild(card);
      if(e.tipo==="liberado") liberados.appendChild(card);

      if(e.dataPrevista) eventos.push({title:e.cliente,start:e.dataPrevista,color:e.tipo==="pendente"?"#f1c40f":e.tipo==="programado"?"#e67e22":"#2ecc71"});
    });

    for(let key in contStatus){
      const barWidth=Math.min(100,(contStatus[key]*10))+'%';
      indicadores.innerHTML+=`<div class="indicador">${key.toUpperCase()}: ${contStatus[key]} <div class="indicador-bar" style="width:${barWidth};background:${key==='pendente'?'#f1c40f':key==='programado'?'#e67e22':'#2ecc71'}"></div></div>`;
    }
    for(let key in contMotivo) indicadores.innerHTML+=`<div class="indicador">Motivo: ${key} (${contMotivo[key]})</div>`;
    for(let key in contItem) indicadores.innerHTML+=`<div class="indicador">Item: ${key} (${contItem[key]})</div>`;

    const calendarEl=document.getElementById("calendar");
    if(calendarEl){calendarEl.innerHTML="";const calendar=new FullCalendar.Calendar(calendarEl,{initialView:"dayGridMonth",events:eventos});calendar.render();}
  }

  searchEmpenho.addEventListener("input",()=>carregarEmpenhos());
  verPendentes.addEventListener("click",()=>carregarEmpenhos());

  exportExcelBtn.addEventListener("click", async ()=>{
    const snapshot=await getDocs(collection(db,"empenhos"));
    const data=[];
    snapshot.forEach(doc=>{
      const e=doc.data();
      data.push({
        Cliente:e.cliente,
        Produtos:e.produtos.join(", "),
        Quantidade:e.quantidade,
        Status:e.tipo,
        Motivo:e.motivo,
        'Liberaçăo Parcial':e.liberacaoParcial?'Sim':'Năo',
        'Data Recebimento':e.dataRecebimento,
        'Data Limite':e.dataEntrega,
        'Data Prevista':e.dataPrevista
      });
    });
    const worksheet=XLSX.utils.json_to_sheet(data);
    const workbook=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook,worksheet,"Empenhos");
    XLSX.writeFile(workbook,"Relatorio_Empenhos.xlsx");
  });
});
</script>
</body>
</html>
